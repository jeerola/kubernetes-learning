apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: project-pv
          persistentVolumeClaim:
            claimName: project-claim
      containers:
      - name: todo-app
        image: eerola/todo-app:2.2
        volumeMounts:
        - name: project-pv
          mountPath: /usr/src/app/project
        imagePullPolicy: Always
        env:
          - name: PORT
            value: "3000"
