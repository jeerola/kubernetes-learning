apiVersion: v1
kind: Service
metadata:
  namespace: exercises
  name: pingpong
spec:
  type: ClusterIP
  selector:
    app: pingpong
  ports:
    - name: http
      protocol: TCP
      port: 3456 # This is a port that is available to the cluster, in this case it can be ~ anything
      targetPort: 3000 # This is the target port
